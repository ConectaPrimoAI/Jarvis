<!DOCTYPE html><html><head><title>Jarvis MVP</title></head><body><h1>Jarvis MVP</h1><canvas id='app'></canvas><script type='module'>import * as THREE from 'https://unpkg.com/three@0.179.1/build/three.module.js';const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('app')});renderer.setSize(innerWidth,innerHeight);const cube=new THREE.Mesh(new THREE.BoxGeometry(),new THREE.MeshNormalMaterial());scene.add(cube);camera.position.z=3;function a(){requestAnimationFrame(a);cube.rotation.y+=0.01;renderer.render(scene,camera)}a();</script></body></html>
